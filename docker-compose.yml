services:
  dashboard:
    build: .
    image: fun-project-dashboard:latest
    container_name: fun-project-dashboard
    ports:
      - "8080:9000"
    environment:
      # Ganti kredensial admin di sini (default: admin / admin)
      ADMIN_USER: admin
      ADMIN_PASS: admin
      # Set ini kalau dibalik reverse proxy yang TIDAK strip prefix.
      # Kosongkan kalau diakses langsung atau proxy sudah strip prefix.
      BASE_PATH: /dockdock/fun-dashboard
    volumes:
      # Named volume — data TIDAK hilang saat "docker compose down"
      # Hanya hilang kalau eksplisit: "docker compose down -v" atau "docker volume rm"
      - dashboard_data:/app/data
    restart: unless-stopped

volumes:
  dashboard_data:
